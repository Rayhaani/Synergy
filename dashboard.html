<script src="https://www.youtube.com/iframe_api"></script>
<script>
    
// 1. INITIALIZATION
const firebaseConfig = { 
    apiKey: "AIzaSyDLTwLq8Le9vYAwRkRcqXPGxFnEqW1yE2E", 
    authDomain: "synergy-protocol.firebaseapp.com", 
    projectId: "synergy-protocol", 
    storageBucket: "synergy-protocol.firebasestorage.app", 
    messagingSenderId: "179647543031", 
    appId: "1:179647543031:web:388da8a36e1bbbb55d85f2" 
};

// Tabbatar Firebase ya tashi lafiya
if (!firebase.apps.length) { 
    firebase.initializeApp(firebaseConfig); 
}
const db = firebase.firestore();
const currentActiveUser = localStorage.getItem('synergy_user');
let player, currentCode = "", dynamicVideos = [], watchedCount = 0;

// 2. ACCESS CHECK & INITIAL LOAD
async function checkAccess() {
    if (!currentActiveUser) { 
        window.location.replace("signin.html"); 
        return; 
    }
    try {
        const doc = await db.collection("users").doc(currentActiveUser).get();
        if (doc.exists && doc.data().isVerified === true) {
            document.body.style.opacity = "1";
            watchedCount = doc.data().videosWatchedToday || 0;
            // Fara loda bidiyo bayan mun san mamba ne
            fetchLatestVideos();
        } else { 
            window.location.replace("activation.html"); 
        }
    } catch (err) { 
        console.error("Access Error", err); 
        document.body.style.opacity = "1"; // Ko da an samu error shafin ya nuna
    }
}

// 3. YOUTUBE LOGIC (STRICT - NO BACKUP IDs)
const API_KEY = 'AIzaSyAv5i78UAOzJjNUp3EiUmRyUFz-9IQfFbU';
const CHANNELS = ['UCj7jOBQq0cpwBp0j7XVikQQ', 'UC_54whp80N3Lyl8tgLQf4Cw'];

async function fetchLatestVideos() {
    try {
        let allVideos = [];
        for (const channelId of CHANNELS) {
            const url = `https://www.googleapis.com/youtube/v3/search?key=${API_KEY}&channelId=${channelId}&part=snippet,id&order=date&maxResults=15&type=video`;
            const res = await fetch(url);
            const data = await res.json();
            
            if (data.items) {
                data.items.forEach(item => {
                    if(item.id && item.id.videoId) {
                        allVideos.push(item.id.videoId);
                    }
                });
            }
        }

        // Tace bidiyon
        dynamicVideos = [...new Set(allVideos)];

        if (dynamicVideos.length > 0) {
            dynamicVideos.sort(() => Math.random() - 0.5);
            // Jira YouTube API ya gama loda kansa kafin kiran player
            if (window.YT && YT.Player) {
                initPlayer();
            }
        } else {
            showSynergyAlert("FETCHING ERROR: NO DATA FROM API", "error");
        }
    } catch (e) { 
        console.error("Fetch Error:", e);
    }
}

// Wannan function din zai jira YouTube IFrame API ya gama loda kansa
function onYouTubeIframeAPIReady() {
    checkAccess(); // Fara komai daga nan
}

function initPlayer() {
    if (dynamicVideos.length === 0) return;
    
    let startVid = dynamicVideos[watchedCount % dynamicVideos.length];
    
    player = new YT.Player('yt-player', {
        height: '100%',
        width: '100%',
        videoId: startVid,
        playerVars: { 
            'controls': 0, 
            'modestbranding': 1, 
            'rel': 0, 
            'iv_load_policy': 3, 
            'disablekb': 1,
            'origin': window.location.origin
        },
        events: { 
            'onStateChange': onPlayerStateChange,
            'onReady': () => {
                const shutter = document.getElementById('shutter');
                if(shutter) shutter.style.display = "flex";
            }
        }
    });
}

function onPlayerStateChange(event) {
    if (event.data === YT.PlayerState.PLAYING) {
        setupSecurityTracker(player);
    }

    if (event.data === YT.PlayerState.ENDED) {
        watchedCount++;
        let nextVid = dynamicVideos[watchedCount % dynamicVideos.length];
        
        player.loadVideoById(nextVid);
        player.pauseVideo(); 

        const shutter = document.getElementById('shutter');
        if (shutter) {
            shutter.style.display = "flex";
            const shutterText = shutter.querySelector('.orbitron');
            if(shutterText) shutterText.innerText = "NEXT UNIT READY";
        }

        generateCode();
        showSynergyAlert("UNIT COMPLETED. START NEXT SESSION.", "success");
    }
}

// 4. CORE UI FUNCTIONS
function startQuantumSession() {
    if (player && player.playVideo) {
        player.playVideo();
        const shutter = document.getElementById("shutter");
        if(shutter) shutter.style.display = "none";
        generateCode();
    }
}

function generateCode() { 
    currentCode = Math.random().toString(36).substring(2,8).toUpperCase(); 
    const display = document.getElementById("generated-code-display");
    if(display) display.innerText = currentCode; 
}

function showSynergyAlert(m) {
    let t = document.getElementById('custom-toast') || document.createElement('div');
    t.id = 'custom-toast'; 
    t.className = 'synergy-toast show'; 
    t.innerHTML = `<span>${m}</span>`;
    document.body.appendChild(t); 
    setTimeout(() => t.classList.remove('show'), 3000);
}

function toggleGoogleMenu(event) {
    event.stopPropagation();
    const menu = document.getElementById('google-nav');
    if(menu) menu.classList.toggle('active');
}

document.addEventListener('click', () => {
    const menu = document.getElementById('google-nav');
    if(menu) menu.classList.remove('active');
});

// 5. SECURITY MODULE
(function() {
    let strikes = 0, lastTime = 0;
    window.setupSecurityTracker = function(p) {
        const tracker = setInterval(() => {
            if (!p || typeof p.getPlayerState !== 'function' || p.getPlayerState() !== 1) return;
            let curr = p.getCurrentTime();
            if (curr > lastTime + 2.5) {
                strikes++; 
                p.seekTo(lastTime);
                if (strikes >= 3) {
                    clearInterval(tracker);
                    document.body.innerHTML = "<div style='color:red;text-align:center;padding-top:100px;font-family:monospace;'><h1>SECURITY BREACH DETECTED</h1><p>SESSION TERMINATED</p></div>";
                } else {
                    showSynergyAlert("NO SKIPPING!", "error");
                }
            } else { 
                lastTime = curr; 
            }
        }, 1000);
    };
})();

// 6. FIREBASE REAL-TIME SYNC
if (currentActiveUser) {
    db.collection("users").doc(currentActiveUser).onSnapshot(doc => {
        if (!doc.exists) return;
        const d = doc.data();
        const total = (d.videoBalance || 0) + (d.shareBalance || 0);
        
        const mainBal = document.getElementById('total-balance-main');
        const videoBal = document.getElementById('video-balance-sub');
        const shareBal = document.getElementById('share-balance-sub');
        const nameDisp = document.getElementById('display-name');
        const countDisp = document.getElementById('daily-count');
        const progBar = document.getElementById('daily-progress-bar');

        if(mainBal) mainBal.innerText = total.toLocaleString();
        if(videoBal) videoBal.innerText = (d.videoBalance || 0).toLocaleString();
        if(shareBal) shareBal.innerText = (d.shareBalance || 0).toLocaleString();
        if(nameDisp) nameDisp.innerText = d.username || "MEMBER";
        
        const w = d.videosWatchedToday || 0;
        if(countDisp) countDisp.innerText = `${w} / 10 UNITS`;
        if(progBar) progBar.style.width = (w * 10) + "%";
    });
}


        
</script>
